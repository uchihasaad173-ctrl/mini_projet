<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | CarLover</title>
    <link rel="stylesheet" href="register and login.css">
</head>
<body>
    <div class="animated-bg"></div>

    <div class="login-container">
        <form class="login-form" id="registerForm">
            <h2>Rejoindre le Garage</h2>
            <p>Créez votre profil de pilote</p>
            
            <div class="input-group">
                <input type="text" id="Username" name="Username" required placeholder=" ">
                <label for="Username">Username</label>
            </div>

            <div class="input-group">
                <input type="email" id="email" name="email" required placeholder=" ">
                <label for="email">Email</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" name="password" required placeholder=" ">
                <label for="password">Password</label>
            </div>

            <div class="input-group">
                <input type="password" id="confirm-password" name="confirm-password" required placeholder=" ">
                <label for="confirm-password">Confirm your password</label>
            </div>
            
            <button type="submit" class="login-btn">Start Journey!</button>
            
            <div class="footer-links">
                <span>Already have an account ? <a href="login page.html">Connect</a></span>
            </div>
        </form>
    </div>

<script>
    const registerForm = document.getElementById('registerForm');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm-password');
    registerForm.addEventListener('submit', function(event) {
        event.preventDefault();
        if (password.value !== confirmPassword.value) {
            alert("⚠️ Erreur : Les mots de passe ne correspondent pas !");
            password.value = "";
            confirmPassword.value = "";
            password.focus(); 
        } 
        else {
            alert("🏎️ Inscription réussie ! Bienvenue dans l'équipe.");
            setTimeout(() => {
                window.location.href = "login page.html"; 
            }, 1000);
        }
    });
</script>
</body>
</html>
