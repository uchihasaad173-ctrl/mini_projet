    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.logo {
    color: white;
    font-size: 1.5rem;
    font-weight: bold;
    text-transform: uppercase;
}

.logo span {
    color: #e74c3c;
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 30px;
    align-items: center; 
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #e74c3c;
}

#profile-img {
    width: 35px;
    height: 35px;
    border-radius: 50%; 
    object-fit: cover;
    border: 2px solid #e74c3c;
    transition: transform 0.3s;
    display: block;
}

#profile-img:hover {
    transform: scale(1.2);
}

.car-grid {
    display: flex;
    flex-wrap: wrap;     
    gap: 20px;           
    padding: 20px;
    justify-content: center;
}

.card {
    position: relative;   
    flex: 1 1 calc(33.333% - 20px ); 
    min-width: 300px;    
    height: 250px;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.card:hover{
    box-shadow:1px 2px 10px #e74c3c;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;    
    transition: transform 0.3s ease;
}

.card:hover img {
    transform: scale(1.1); 
}

.texte-overlay {
    position: absolute;
    bottom: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 8px 16px;
    border-radius: 5px;
    font-family: 'Arial', sans-serif;
    pointer-events: none; 
}
label{
    border-bottom:3px solid white ;
    display: block;
    margin: 40px 25px 3px 25px;
    color: aliceblue;
    font-size: 35px;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    text-decoration: solid ;
}
body{
    background-color: #111;
}
#exceptionLabel{
    border: none;
    display: inline;
    margin-left: 10%;
}
select{
    margin: 50px 0 10px 0 ;
    width: 20% ;
    min-width: 200px;
    height: 40px;
    text-align: center;
    font-size: 20px  ;    
}
    </style>
